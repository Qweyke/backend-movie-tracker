version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: movie_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: movie_app
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/
    # This allows you to interact with CLI inside the container
    stdin_open: true 
    tty: true

volumes:
  mongo_data: